# =============================================================================
# RetroArch SDL2 Autoconfig: ShanWan Hyperkin N64 Adapter
# =============================================================================
# Device:     ShanWan Hyperkin Adapter (VID 121 / PID 38222)
# Driver:     sdl2
# Platform:   Linux (Bazzite + RetroDeck)
#
# -----------------------------------------------------------------------------
# BUTTON MAPPING PHILOSOPHY
# -----------------------------------------------------------------------------
# RetroArch uses a virtual "RetroPad" modelled on the SNES controller layout.
# Physical controller buttons are first mapped to RetroPad positions, then the
# emulator core maps RetroPad positions to the emulated console's buttons.
#
# RetroPad face button layout (SNES positions):
#
#         [X]
#      [Y]   [A]
#         [B]
#
# N64 face button layout:
#
#      [B]   [A]
#
# N64 -> RetroPad mapping by position:
#   N64 A (bottom-right) -> RetroPad B  -> input_b_btn
#   N64 B (left)         -> RetroPad Y  -> input_y_btn
#
# RetroPad A and X have no N64 equivalent, so they are set to 999
# (unmapped) to remain unused
#
# -----------------------------------------------------------------------------
# SDL2 BUTTON NUMBERS (after gamecontrollerdb.txt remapping)
# -----------------------------------------------------------------------------
# SDL2 remaps raw jsdev button numbers to a sequential 0-based index:
#   0  = N64 A  (jsdev 1, SDL "a" button -> retroarch button 0)
#   1  = N64 B  (jsdev 2, SDL "b" button -> retroarch button 1)
#   4  = Z trigger
#   6  = Start
#   9  = L shoulder
#   10 = R shoulder
#   11 = D-pad Up
#   12 = D-pad Down
#   13 = D-pad Left
#   14 = D-pad Right
#
# Axes (after gamecontrollerdb.txt remapping):
#   0/1 = Analog stick X/Y
#   2/3 = C buttons X/Y
#   4   = Z trigger analog component (duplicate of button 4, unused here)
# =============================================================================

input_driver = "sdl2"
input_device = "ShanWan Hyperkin Adapter"
input_vendor_id = "121"
input_product_id = "38222"

# -----------------------------------------------------------------------------
# Face buttons
# -----------------------------------------------------------------------------
input_b_btn = "0"
input_b_btn_label = "A"

input_y_btn = "1"
input_y_btn_label = "B"

input_a_btn = "999"
input_a_btn_label = "NONE"

input_x_btn = "999"
input_x_btn_label = "NONE"

# -----------------------------------------------------------------------------
# Start / Select
# N64 has no Select button — set to 999
# -----------------------------------------------------------------------------
input_start_btn = "6"
input_start_btn_label = "Start"

input_select_btn = "999"

# -----------------------------------------------------------------------------
# Shoulder buttons
# L and R are digital buttons on this adapter.
# Z is the N64 trigger — mapped to RetroPad L2 axis +4.
# L3/R3 (analog stick clicks) have no N64 equivalent — set to 999.
# -----------------------------------------------------------------------------
input_l_btn = "9"
input_l_btn_label = "L"

input_r_btn = "10"
input_r_btn_label = "R"

# input_l2_btn = "4"
input_l2_btn_label = "Z"
input_l2_axis = "+4"

input_r2_axis = "+999"

input_l3_btn = "999"
input_r3_btn = "999"

# -----------------------------------------------------------------------------
# D-pad
# -----------------------------------------------------------------------------
input_up_btn = "11"
input_up_btn_label = "D-Pad Up"

input_down_btn = "12"
input_down_btn_label = "D-Pad Down"

input_left_btn = "13"
input_left_btn_label = "D-Pad Left"

input_right_btn = "14"
input_right_btn_label = "D-Pad Right"

# -----------------------------------------------------------------------------
# Analog stick (left stick = N64 control stick)
# -----------------------------------------------------------------------------
input_l_x_minus_axis = "-0"
input_l_x_plus_axis = "+0"
input_l_y_minus_axis = "-1"
input_l_y_plus_axis = "+1"

# -----------------------------------------------------------------------------
# C buttons (mapped to right analog stick axes)
# C-Left/Right -> axis 2
# C-Up/Down -> axis 3
# -----------------------------------------------------------------------------
input_r_x_minus_axis = "-2"
input_r_x_plus_axis = "+2"
input_r_y_minus_axis = "-3"
input_r_y_plus_axis = "+3"
